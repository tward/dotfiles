- defaults:
    link:
      relink: true

- create:
    - ~/.local/bin
    - ~/.config/ranger

# Requires 4 space indentation or it will fail
- link:
    ~/.config/bat: bat
    ~/.fzfrc: fzfrc
    ~/.gitconfig: gitconfig
    ~/.gitignore_global: gitignore_global
    ~/.Brewfile: homebrew/Brewfile
    ~/.config/htop: htop
    ~/.config/kitty: kitty
    ~/.config/lazygit: lazygit
    ~/.config/nvim: neovim
    ~/.config/ranger: ranger
    ~/.config/sketchybar: sketchybar
    ~/.config/skhd: skhd
    ~/.config/tmux: tmux
    ~/.config/yabai: yabai
    ~/.editorconfig: editorconfig
    ~/.zshenv: zshenv
    ~/.config/zsh: zsh

- shell:
    - [brew bundle --file=homebrew/Brewfile, Installing Homebrew packages]
    - ["test -d ~/.config/tmux/plugins/tpm || git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm", Installing TPM]
    - ["~/.config/tmux/plugins/tpm/bin/install_plugins", Installing tmux plugins]
