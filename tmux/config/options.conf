###############################################################################
# Behaviour
###############################################################################

# Set default shell
set-option -g default-shell $SHELL

# Use tmux-256color for proper clipboard and color support
set -g default-terminal "tmux-256color"

# OSC 52 clipboard — works over SSH, no pbcopy needed
set -s set-clipboard on

# Enable mouse controls
set -g mouse on

setw -g mode-keys vi

setw -g xterm-keys on

# faster command sequences
set -s escape-time 10

# increase repeat timeout
set -sg repeat-time 600
set -s focus-events on

setw -q -g utf8 on

# # Increase default pane buffer size
set-option -g history-limit 10000

# start windows numbering at 0
set -g base-index 0

# make pane numbering consistent with windows
setw -g pane-base-index 0

# rename window to reflect current program
setw -g automatic-rename on

# renumber windows when a window is closed
set -g renumber-windows on

# set terminal title
set -g set-titles on

# slightly longer pane indicators display time
set -g display-panes-time 800

# slightly longer status messages display time
set -g display-time 1000

# redraw status line every 10 seconds
set -g status-interval 10

# activity - set quiet mode
setw -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action none

set-option -sa terminal-overrides ',*:RGB'
set-option -sa terminal-features ',xterm-256color:clipboard'

###############################################################################
# Resurrect
###############################################################################

set -g @resurrect-dir "$tmux_dir/resurrect"
set -g @resurrect-save "S"                          # Save the session
set -g @resurrect-restore "R"                       # Reload the session
set -g @continuum-restore "on"                      # Last saved session is always restored
set -g @resurrect-strategy-nvim "session"           # Restore Neovim session if a Session.vim file is present